org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Suppresses the "Inconsistent JVM-target compatibility" hard error that
# Kotlin Gradle Plugin 1.8+ promotes to a build failure when a plugin's
# Java compileOptions and Kotlin jvmTarget don't match. Third-party
# Flutter plugins (home_widget, flutter_timezone) hardcode different Java
# versions in their own build.gradle files that can't be reliably
# overridden from the root project without breaking other plugins. IGNORE
# demotes this to a warning so the build can proceed — the actual bytecode
# produced is still valid and compatible.
kotlin.jvm.target.validation.mode=IGNORE
kotlin.incremental=false
